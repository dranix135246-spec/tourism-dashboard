<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2025年全国旅游数据分析大屏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            min-height: 100vh;
            padding: 40px 20px;
            color: #f1f5f9;
        }

        .dashboard-container {
            max-width: 1800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
            padding: 30px;
            background: rgba(30, 41, 59, 0.6);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(100, 116, 139, 0.3);
        }

        .header h1 {
            font-size: 36px;
            font-weight: bold;
            background: linear-gradient(90deg, #60a5fa, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .header p {
            color: #94a3b8;
            font-size: 16px;
        }

        .chart-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            margin-bottom: 30px;
        }

        .chart-row.single {
            grid-template-columns: 1fr;
        }

        .chart-card {
            background: rgba(30, 41, 59, 0.6);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(100, 116, 139, 0.3);
            backdrop-filter: blur(10px);
            transition: all 0.4s ease;
        }

        .chart-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(59, 130, 246, 0.2);
            border-color: rgba(96, 165, 250, 0.5);
        }

        .chart-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #f1f5f9;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chart-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: linear-gradient(180deg, #60a5fa, #a78bfa);
            border-radius: 2px;
        }

        .chart-wrapper {
            background: rgba(15, 23, 42, 0.8);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(100, 116, 139, 0.2);
        }

        .chart-wrapper img {
            width: 100%;
            display: block;
        }

        .footer {
            text-align: center;
            margin-top: 50px;
            padding: 25px;
            background: rgba(30, 41, 59, 0.6);
            border-radius: 15px;
            border: 1px solid rgba(100, 116, 139, 0.3);
        }

        .footer p {
            color: #64748b;
            font-size: 14px;
        }

        .scroll-top-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 20px;
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.4);
        }

        .scroll-top-btn.show {
            opacity: 1;
            visibility: visible;
        }

        .scroll-top-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 40px rgba(59, 130, 246, 0.5);
        }

        @media (max-width: 1200px) {
            .chart-row {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 24px;
            }

            .chart-title {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="header">
            <h1>📊 2025年全国旅游数据分析大屏</h1>
            <p>杭州核心景点客流量 · 全国热门旅游城市对比</p>
        </div>

        <div class="chart-row">
            <div class="chart-card">
                <div class="chart-title">杭州核心景点年度客流量变化趋势（2019-2025）</div>
                <div class="chart-wrapper">
                    <img src="tourism_charts/01_yearly_trend.png" alt="年度客流量趋势">
                </div>
            </div>

            <div class="chart-card">
                <div class="chart-title">2025年杭州核心景点月度客流量分布</div>
                <div class="chart-wrapper">
                    <img src="tourism_charts/02_monthly_distribution.png" alt="月度客流量分布">
                </div>
            </div>
        </div>

        <div class="chart-row">
            <div class="chart-card">
                <div class="chart-title">2025年全国20座热门旅游城市核心文旅数据对比</div>
                <div class="chart-wrapper">
                    <img src="tourism_charts/03_city_comparison.png" alt="城市文旅数据对比">
                </div>
            </div>

            <div class="chart-card">
                <div class="chart-title">2025年全国20座热门旅游城市淡季旺季客流量对比</div>
                <div class="chart-wrapper">
                    <img src="tourism_charts/05_seasonal_comparison.png" alt="淡季旺季对比">
                </div>
            </div>
        </div>

        <div class="chart-row single">
            <div class="chart-card">
                <div class="chart-title">2025年全国20座热门旅游城市五维度综合实力排行榜</div>
                <div class="chart-wrapper">
                    <img src="tourism_charts/04_ranking_chart.png" alt="五维度排行榜">
                </div>
            </div>
        </div>

        <div class="footer">
            <p>数据来源：2025年全国旅游统计数据 | 可视化制作</p>
        </div>
    </div>

    <button class="scroll-top-btn" onclick="scrollToTop()">↑</button>

    <script>
        const scrollTopBtn = document.querySelector('.scroll-top-btn');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 300) {
                scrollTopBtn.classList.add('show');
            } else {
                scrollTopBtn.classList.remove('show');
            }
        });

        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
